    body{

    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1; 
      filter: brightness(0.3) blur(6px); 
    }

    
    #intro{
      position:fixed;
      top:0;left:0;width:100%;height:100%;
      background:rgba(0,0,0,0.9);
      display:flex;align-items:center;justify-content:center;
      flex-direction:column;
      z-index:1000;
      cursor:pointer;
      transition:opacity .8s ease;
    }
    #intro h1{
      font-size:3rem;
      text-shadow:0 0 30px #ff0000,0 0 80px #8b0000;
      animation:glowIntro 2s infinite alternate;
    }
    @keyframes glowIntro{
      0%{opacity:.6;text-shadow:0 0 20px #8b0000;}
      100%{opacity:1;text-shadow:0 0 60px #ff0000;}
    }

    
    #main{
      opacity:0;
      pointer-events:none;
      transition:opacity 1s ease;
      padding:12px 0;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      height:100vh;
      min-height:100vh;
    }

    
    .grid{
      display:grid;
      grid-template-columns:repeat(7, 170px);
      grid-auto-rows: 300px;
      justify-content:center;
      justify-items:center;
      gap:12px;
      width:fit-content;
      max-width:100%;
      padding:0 10px;
      margin:0 auto;
    }

   
    .card{
      flex: 0 0 auto;
      width:170px;
      height:300px;
      background:rgba(255,255,255,0.08);
      border-radius:25px;
      padding:14px;
      text-align:center;

      overflow:hidden;

      box-shadow:0 0 18px rgba(255,255,255,0.2), inset 0 0 10px rgba(255,255,255,0.15);
      transition:0.5s;
    }

    .card:hover{
      transform:scale(1.12) rotateX(6deg) rotateY(6deg);
      box-shadow:0 0 50px rgba(255,255,255,0.35),0 0 120px rgba(255,255,255,0.18),inset 0 0 20px rgba(255,255,255,0.25);
    }

    .card::before{
      content:"";
      position:absolute;
      top:-50%; left:-50%;
      width:200%; height:200%;
      background:conic-gradient(rgba(255,255,255,0.2),rgba(255,255,255,0.08),rgba(255,255,255,0.2));
      animation:spin 4s linear infinite;
      opacity:.28;
    }
    .card::after{
      content:"";
      position:absolute;
      inset:6px;
      background:rgba(0,0,0,0.8);
      border-radius:20px;
      z-index:0;
    }
    @keyframes spin{
      0%{transform:rotate(0deg);}
      100%{transform:rotate(360deg);}
    }

    .card-content{
      position:relative;
      z-index:5;
    }

    .pfp{
      width:120px;height:120px;
      object-fit:cover;

      margin-top:8px;

  <canvas id="cursor-canvas"></canvas>

  <script>
    const intro=document.getElementById("intro");
    const main=document.getElementById("main");
    const music=document.getElementById("music");

    intro.addEventListener("click",()=>{
      intro.style.opacity="0";
      setTimeout(()=>{
        intro.style.display="none";
        main.style.opacity="1";
        main.style.pointerEvents="auto";
      },800);
      music.play().catch(()=>{});
    });

    // Cursor particle system (calm black particles)
    (function(){
      const canvas = document.getElementById('cursor-canvas');
      const ctx = canvas.getContext('2d');
      const DPR = window.devicePixelRatio || 1;
      function resize(){
        canvas.width = window.innerWidth * DPR;
        canvas.height = window.innerHeight * DPR;
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        ctx.setTransform(DPR,0,0,DPR,0,0);
      }
      canvas.style.position = 'fixed';
      canvas.style.left = '0';
      canvas.style.top = '0';
      canvas.style.pointerEvents = 'none';
      canvas.style.zIndex = '600';
      resize();
      window.addEventListener('resize', resize);

      const particles = [];
      function createParticle(x,y){
        const angle = (Math.random() - 0.5) * Math.PI; // gentle spread
        const speed = 0.2 + Math.random() * 0.5; // slower
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 0.3,
          life: 60 + Math.random() * 40,
          size: 0.8 + Math.random() * 1.2,
          decay: 0.992
        });
        if(particles.length > 250) particles.shift();
      }

      window.addEventListener('mousemove', (e)=>{
        const mx = e.clientX;
        const my = e.clientY;
        const count = Math.random() < 0.15 ? 2 : 1; // mostly 1
        for(let i=0;i<count;i++){
          createParticle(mx + (Math.random()-0.5)*6, my + (Math.random()-0.5)*6);
        }
      });
      window.addEventListener('touchmove', (e)=>{
        if(e.touches && e.touches[0]){
          const t = e.touches[0];
          createParticle(t.clientX, t.clientY);
        }
      }, {passive:true});

      function update(){
        // clear canvas each frame to avoid accumulating darkness
        ctx.clearRect(0,0,canvas.width/DPR, canvas.height/DPR);

        for(let i = particles.length - 1; i >= 0; i--){
          const p = particles[i];
          p.vy += 0.01; // very light gravity
          p.x += p.vx;
          p.y += p.vy;
          p.life -= 1;
          p.size *= p.decay;
          const alpha = Math.max(0, Math.min(1, p.life / 100));
          ctx.save();
          ctx.globalAlpha = 0.6 * alpha;
          ctx.fillStyle = '#000';
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
          ctx.fill();
          ctx.restore();
          if(p.life <= 0 || p.y > window.innerHeight + 80) particles.splice(i,1);
        }
        requestAnimationFrame(update);
      }
      requestAnimationFrame(update);
    })();

        // Volume control wiring
        (function(){
          const volRange = document.getElementById('volume-range');
          if(!volRange) return;
          const stored = localStorage.getItem('bg_music_volume');
          const initial = stored !== null ? parseFloat(stored) : 0.6;
          volRange.value = initial;
          music.volume = initial;
          volRange.addEventListener('input', (e)=>{
            const v = parseFloat(e.target.value);
            music.volume = v;
            localStorage.setItem('bg_music_volume', v);
          });
        })();

        // Views counter wiring
        (function(){
          const COUNT_KEY = 'views_count_v1';
          const TIME_KEY = 'views_time_v1';
          const START = 653;
          const PERIOD = 3 * 60 * 60 * 1000; // 3 hours
          const now = Date.now();
          let count = parseInt(localStorage.getItem(COUNT_KEY) || START, 10);
          let last = parseInt(localStorage.getItem(TIME_KEY) || now, 10);

          // apply missed increments since last
          const elapsedPeriods = Math.floor((now - last) / PERIOD);
          if(elapsedPeriods > 0){
            count += elapsedPeriods * 2;
            last = last + elapsedPeriods * PERIOD;
            localStorage.setItem(COUNT_KEY, count);
            localStorage.setItem(TIME_KEY, last);
          } else {
            // ensure stored
            localStorage.setItem(COUNT_KEY, count);
            localStorage.setItem(TIME_KEY, last);
          }

          const el = document.getElementById('views-count');
          function render(){ if(el) el.textContent = count; }
          render();

          function scheduleNext(){
            const next = last + PERIOD;
            const delay = Math.max(0, next - Date.now());
            setTimeout(()=>{
              count += 2;
              last = next;
              localStorage.setItem(COUNT_KEY, count);
              localStorage.setItem(TIME_KEY, last);
              render();
              scheduleNext();
            }, delay);
          }
          scheduleNext();
        })();
